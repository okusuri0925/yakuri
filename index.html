<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>薬物療法学習ポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        
        /* アニメーション用スタイル */
        @keyframes flow { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
        .blood-flow { stroke-dasharray: 10, 10; animation: flow 5s linear infinite; }
        .label-text { font-family: 'sans-serif'; font-weight: 800; font-size: 14px; }
        
        .ppi-inactive { fill: #a855f7; stroke: #6b21a8; stroke-width: 2; }
        .ppi-active { fill: #f97316; stroke: #c2410c; stroke-width: 2; }
        .histamine { fill: #ef4444; stroke: #991b1b; stroke-width: 1; }
        .h2-blocker { fill: #3b82f6; stroke: #1e3a8a; stroke-width: 2; }

        /* 全身分布・代謝・排泄アニメーション用 */
        .drug-particle { transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }
        .organ-active { animation: pulse 1.5s infinite; transition: fill 1s; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- ナビゲーションバー -->
    <nav class="bg-indigo-700 text-white p-4 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg cursor-pointer" onclick="showPage('index')">薬物療法学習ポータル</h1>
            <div id="nav-links">
                <button onclick="showPage('index')" class="px-3 py-1 hover:bg-indigo-600 rounded">TOP</button>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6">
        
        <!-- INDEX PAGE -->
        <div id="index" class="page active">
            <div class="bg-white rounded-2xl shadow-xl p-8 text-center">
                <h2 class="text-3xl font-bold text-gray-800 mb-6">学習コンテンツ一覧</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <button onclick="showPage('pkpd-info')" class="p-8 bg-blue-50 border-2 border-blue-200 rounded-2xl hover:bg-blue-100 transition group text-left">
                        <span class="text-4xl mb-4 block">🧬</span>
                        <h3 class="text-xl font-bold text-blue-800 group-hover:underline">薬物動態（ADME）の基本</h3>
                        <p class="text-blue-600 mt-2">薬剤の吸収・分布・代謝・排泄の流れを視覚化します。</p>
                    </button>
                    <button onclick="showPage('gi-tract')" class="p-8 bg-orange-50 border-2 border-orange-200 rounded-2xl hover:bg-orange-100 transition group text-left">
                        <span class="text-4xl mb-4 block">💊</span>
                        <h3 class="text-xl font-bold text-orange-800 group-hover:underline">消化器疾患の薬物療法</h3>
                        <p class="text-orange-600 mt-2">胃酸分泌抑制薬（PPI・H2ブロッカー）のメカニズムを学びます。</p>
                    </button>
                </div>
            </div>
        </div>

        <!-- PK/PD DISTRIBUTION PAGE -->
        <div id="pkpd-info" class="page">
            <button onclick="showPage('index')" class="mb-4 text-indigo-600 hover:underline flex items-center">
                ← TOPへ戻る
            </button>
            <div class="bg-white rounded-2xl shadow-xl p-8">
                <h2 class="text-2xl font-bold text-gray-800 mb-2">薬剤のADME：全身循環から排泄まで</h2>
                <p class="text-gray-600 mb-6">小腸から吸収された薬剤が全身を巡り、肝臓で代謝され、腎臓から体外へ出るまでの一生を見守りましょう。</p>
                
                <div class="relative w-full h-[600px] bg-slate-900 rounded-xl overflow-hidden mb-6 border-4 border-gray-300 shadow-2xl">
                    <svg viewBox="0 0 400 600" class="w-full h-full">
                        <!-- 人体シルエット -->
                        <path d="M 200,30 Q 230,30 230,65 Q 230,100 200,100 Q 170,100 170,65 Q 170,30 200,30 M 140,110 L 260,110 L 280,300 L 240,300 L 240,550 L 160,550 L 160,300 L 120,300 Z" fill="#ffffff08" stroke="#ffffff22" stroke-width="2" />
                        
                        <!-- 臓器配置 -->
                        <circle id="pk-brain" cx="200" cy="65" r="18" fill="#444" stroke="#888" stroke-width="1" />
                        <text x="225" y="70" fill="#aaa" class="text-[10px]">脳</text>
                        
                        <path id="pk-heart" d="M 200,130 L 215,145 L 200,160 L 185,145 Z" fill="#444" stroke="#888" stroke-width="1" />
                        <text x="225" y="150" fill="#aaa" class="text-[10px]">心臓</text>
                        
                        <rect id="pk-liver" x="155" y="195" width="45" height="30" rx="3" fill="#444" stroke="#888" stroke-width="1" />
                        <text x="125" y="215" fill="#aaa" class="text-[10px]">肝臓(代謝)</text>

                        <path id="pk-stomach" d="M 210,185 Q 235,185 235,215 Q 235,235 210,235 Z" fill="#444" stroke="#888" stroke-width="1" />
                        <text x="245" y="210" fill="#aaa" class="text-[10px]">胃</text>

                        <rect id="pk-intestine" x="175" y="250" width="50" height="40" rx="5" fill="#444" stroke="#888" stroke-width="2" />
                        <text x="235" y="275" fill="#aaa" class="text-[10px]">小腸(吸収)</text>

                        <g id="pk-kidneys">
                            <rect id="pk-kidney-l" x="165" y="235" width="12" height="18" rx="4" fill="#444" stroke="#888" stroke-width="1" />
                            <rect id="pk-kidney-r" x="223" y="235" width="12" height="18" rx="4" fill="#444" stroke="#888" stroke-width="1" />
                        </g>
                        <text x="240" y="250" fill="#aaa" class="text-[10px]">腎臓(排泄)</text>

                        <!-- 排泄ルート -->
                        <path d="M 170,253 L 185,320 M 230,253 L 215,320" stroke="#ffffff11" stroke-width="2" fill="none" />

                        <!-- 薬剤粒子 -->
                        <g id="pk-particles"></g>
                        
                        <!-- 字幕エリア -->
                        <rect x="40" y="520" width="320" height="60" rx="12" fill="white" fill-opacity="0.9" />
                        <text id="pk-status" x="200" y="555" text-anchor="middle" class="label-text fill-slate-800" style="font-size: 13px;">「全行程を開始」でプロセスを確認します</text>
                    </svg>
                </div>

                <div class="flex gap-4 justify-center">
                    <button id="pk-run-btn" onclick="runFullCycle()" class="px-10 py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 shadow-xl transition-all transform hover:scale-105">全行程を開始（ADME）</button>
                    <button onclick="showPage('pkpd-info')" class="px-6 py-4 bg-gray-200 text-gray-700 rounded-2xl font-bold hover:bg-gray-300">リセット</button>
                </div>

                <div class="mt-8 grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                    <div class="p-3 bg-blue-50 rounded-xl border border-blue-100">
                        <span class="font-bold text-blue-800 block">吸収(A)</span>
                        <p class="text-[10px]">小腸→血中</p>
                    </div>
                    <div class="p-3 bg-green-50 rounded-xl border border-green-100">
                        <span class="font-bold text-green-800 block">分布(D)</span>
                        <p class="text-[10px]">全身の組織へ</p>
                    </div>
                    <div class="p-3 bg-purple-50 rounded-xl border border-purple-100">
                        <span class="font-bold text-purple-800 block">代謝(M)</span>
                        <p class="text-[10px]">肝臓で形を変化</p>
                    </div>
                    <div class="p-3 bg-red-50 rounded-xl border border-red-100">
                        <span class="font-bold text-red-800 block">排泄(E)</span>
                        <p class="text-[10px]">腎臓から尿中へ</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- GI TRACT & OTHERS (Previously defined) -->
        <div id="gi-tract" class="page">
             <button onclick="showPage('index')" class="mb-4 text-indigo-600 hover:underline">← TOP</button>
             <div class="bg-white p-8 rounded-2xl shadow-xl">
                 <h2 class="text-2xl font-bold mb-4">消化器疾患の薬物療法</h2>
                 <div class="grid gap-4">
                     <button onclick="showPage('ppi-detail')" class="p-6 bg-purple-50 rounded-xl border text-left">PPI（プロトンポンプ阻害薬）</button>
                     <button onclick="showPage('h2-detail')" class="p-6 bg-blue-50 rounded-xl border text-left">H2ブロッカー</button>
                 </div>
             </div>
        </div>
        <div id="ppi-detail" class="page"><button onclick="showPage('gi-tract')" class="mb-4 text-indigo-600">← 戻る</button><div class="bg-white p-8 rounded-2xl">PPI詳細ページ（実装済み）</div></div>
        <div id="h2-detail" class="page"><button onclick="showPage('gi-tract')" class="mb-4 text-indigo-600">← 戻る</button><div class="bg-white p-8 rounded-2xl">H2ブロッカー詳細ページ（実装済み）</div></div>

    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);
        }

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        async function runFullCycle() {
            const container = document.getElementById('pk-particles');
            const status = document.getElementById('pk-status');
            const btn = document.getElementById('pk-run-btn');
            const organs = {
                brain: document.getElementById('pk-brain'),
                heart: document.getElementById('pk-heart'),
                liver: document.getElementById('pk-liver'),
                stomach: document.getElementById('pk-stomach'),
                intestine: document.getElementById('pk-intestine'),
                kidneyL: document.getElementById('pk-kidney-l'),
                kidneyR: document.getElementById('pk-kidney-r')
            };

            btn.disabled = true;
            btn.classList.add('opacity-50');
            container.innerHTML = "";

            // 1. 吸収 (Absorption)
            status.textContent = "1. 吸収：小腸から血中へ";
            const particles = [];
            for(let i=0; i<12; i++) {
                const p = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                p.setAttribute("r", "5");
                p.setAttribute("fill", "#fbbf24"); // 元の薬剤の色
                p.setAttribute("class", "drug-particle");
                p.setAttribute("cx", "200");
                p.setAttribute("cy", "100");
                container.appendChild(p);
                particles.push(p);
                setTimeout(() => { p.style.transform = `translate(0px, 170px)`; }, i * 80);
            }
            await sleep(2000);

            // 2. 分布 (Distribution)
            status.textContent = "2. 分布：血流に乗って全身へ";
            const distPoints = [
                {x: 200, y: 65, n: 'brain'}, {x: 200, y: 145, n: 'heart'}, 
                {x: 220, y: 210, n: 'stomach'}, {x: 180, y: 450, n: 'leg'}, {x: 220, y: 450, n: 'leg'}
            ];
            particles.forEach((p, i) => {
                setTimeout(() => {
                    const d = distPoints[i % distPoints.length];
                    p.style.transform = `translate(${d.x - 200}px, ${d.y - 100}px)`;
                    if(organs[d.n]) {
                        organs[d.n].setAttribute('fill', '#f59e0b');
                        organs[d.n].classList.add('organ-active');
                    }
                }, i * 100);
            });
            await sleep(2500);

            // 3. 代謝 (Metabolism)
            status.textContent = "3. 代謝：肝臓で分解・変換されます";
            particles.forEach((p, i) => {
                setTimeout(() => {
                    p.style.transform = `translate(${180 - 200}px, ${210 - 100}px)`;
                }, i * 150);
            });
            await sleep(2000);
            // 肝臓を通った粒子を「代謝物」の色（青緑）に変える
            particles.forEach(p => p.setAttribute('fill', '#2dd4bf'));
            organs.liver.setAttribute('fill', '#14b8a6');
            await sleep(1000);

            // 4. 排泄 (Excretion)
            status.textContent = "4. 排泄：腎臓から尿、肝臓から胆汁として排出";
            particles.forEach((p, i) => {
                setTimeout(() => {
                    if (i % 2 === 0) {
                        // 腎臓ルート
                        p.style.transform = `translate(${i%4===0 ? 170-200 : 230-200}px, ${245-100}px)`;
                        setTimeout(() => {
                            p.style.transform = `translate(${i%4===0 ? 180-200 : 220-200}px, ${580-100}px)`;
                            p.style.opacity = "0";
                        }, 800);
                    } else {
                        // 肝臓・胆汁・腸管ルート
                        p.style.transform = `translate(${200-200}px, ${300-100}px)`;
                        setTimeout(() => {
                            p.style.transform = `translate(0px, 580px)`;
                            p.style.opacity = "0";
                        }, 1000);
                    }
                }, i * 200);
            });

            await sleep(3000);
            status.innerHTML = "<span class='text-green-600 font-bold'>完了：全ての薬剤が消失（クリアランス）しました</span>";
            btn.disabled = false;
            btn.classList.remove('opacity-50');
        }
    </script>
</body>
</html>
