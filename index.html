<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>薬物療法学習ポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        
        /* アニメーション用スタイル */
        @keyframes flow { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
        .blood-flow { stroke-dasharray: 10, 10; animation: flow 5s linear infinite; }
        .label-text { font-family: 'sans-serif'; font-weight: 800; font-size: 14px; }
        .area-label { font-size: 16px; letter-spacing: 0.1em; }
        
        .ppi-inactive { fill: #a855f7; stroke: #6b21a8; stroke-width: 2; }
        .ppi-active { fill: #f97316; stroke: #c2410c; stroke-width: 2; }
        .histamine { fill: #ef4444; stroke: #991b1b; stroke-width: 1; }
        .h2-blocker { fill: #3b82f6; stroke: #1e3a8a; stroke-width: 2; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- ナビゲーションバー -->
    <nav class="bg-indigo-700 text-white p-4 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg cursor-pointer" onclick="showPage('index')">薬物療法学習ポータル</h1>
            <div id="nav-links">
                <button onclick="showPage('index')" class="px-3 py-1 hover:bg-indigo-600 rounded">TOP</button>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6">
        
        <!-- INDEX PAGE -->
        <div id="index" class="page active">
            <div class="bg-white rounded-2xl shadow-xl p-8 text-center">
                <h2 class="text-3xl font-bold text-gray-800 mb-6">学習コンテンツ一覧</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <button onclick="showPage('gi-tract')" class="p-8 bg-orange-50 border-2 border-orange-200 rounded-2xl hover:bg-orange-100 transition group text-left">
                        <span class="text-4xl mb-4 block">💊</span>
                        <h3 class="text-xl font-bold text-orange-800 group-hover:underline">消化器疾患の薬物療法</h3>
                        <p class="text-orange-600 mt-2">胃酸分泌抑制薬（PPI・H2ブロッカー）のメカニズムを学びます。</p>
                    </button>
                    <div class="p-8 bg-gray-50 border-2 border-gray-200 rounded-2xl opacity-50 cursor-not-allowed text-left">
                        <span class="text-4xl mb-4 block">🫀</span>
                        <h3 class="text-xl font-bold text-gray-800">循環器疾患（準備中）</h3>
                        <p class="text-gray-600 mt-2">降圧薬や利尿薬などのコンテンツを順次追加予定です。</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- GI TRACT (消化器) PAGE -->
        <div id="gi-tract" class="page">
            <button onclick="showPage('index')" class="mb-4 text-indigo-600 hover:underline flex items-center">
                ← TOPへ戻る
            </button>
            <div class="bg-white rounded-2xl shadow-xl p-8">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">消化器疾患の薬物療法</h2>
                <p class="text-gray-600 mb-8">胃酸分泌を抑制する代表的な薬剤、PPIとH2ブロッカーの違いを詳しく見てみましょう。</p>
                
                <div class="grid grid-cols-1 gap-4">
                    <button onclick="showPage('ppi-detail')" class="flex items-center p-6 bg-purple-50 rounded-xl border border-purple-200 hover:bg-purple-100 transition">
                        <div class="w-12 h-12 bg-purple-600 rounded-full flex items-center justify-center text-white font-bold mr-4">PPI</div>
                        <div class="text-left">
                            <h4 class="font-bold text-purple-900">PPI（プロトンポンプ阻害薬）</h4>
                            <p class="text-sm text-purple-700">胃酸分泌の「最終出口」をブロックする強力な薬剤。</p>
                        </div>
                        <span class="ml-auto text-purple-400">→</span>
                    </button>

                    <button onclick="showPage('h2-detail')" class="flex items-center p-6 bg-blue-50 rounded-xl border border-blue-200 hover:bg-blue-100 transition">
                        <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold mr-4">H2</div>
                        <div class="text-left">
                            <h4 class="font-bold text-blue-900">H2ブロッカー（ヒスタミンH2受容体拮抗薬）</h4>
                            <p class="text-sm text-blue-700">酸分泌の「スイッチ（受容体）」を遮断する薬剤。</p>
                        </div>
                        <span class="ml-auto text-blue-400">→</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- PPI DETAIL PAGE -->
        <div id="ppi-detail" class="page">
            <button onclick="showPage('gi-tract')" class="mb-4 text-indigo-600 hover:underline flex items-center">
                ← 消化器ページへ戻る
            </button>
            <div class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100">
                <h2 class="text-2xl font-bold mb-6 text-gray-800 flex items-center">
                    <span class="w-2 h-8 bg-purple-600 rounded-full mr-3"></span>
                    PPI（プロトンポンプ阻害薬）の作用機序
                </h2>
                <!-- PPI SVG Animation Container -->
                <div class="relative w-full h-[350px] bg-white rounded-xl overflow-hidden border border-gray-200 mb-6">
                    <svg viewBox="0 0 500 400" id="ppi-svg" class="w-full h-full">
                        <rect x="0" y="0" width="500" height="80" fill="#e0f2fe" />
                        <rect x="0" y="320" width="500" height="80" fill="#fee2e2" />
                        <line x1="0" y1="320" x2="500" y2="320" stroke="#fca5a5" stroke-width="2" class="blood-flow" />
                        <path id="ppi-cell-body" d="M 40,80 L 460,80 L 460,320 L 40,320 Z" fill="#fffbeb" stroke="#fbbf24" stroke-width="4" />
                        <g id="ppi-pump-group">
                            <rect x="210" y="70" width="80" height="20" rx="3" fill="#e11d48" />
                        </g>
                        <g id="ppi-acid-flow">
                            <circle cx="250" cy="65" r="4" fill="#3b82f6"><animate id="ppi-acid-anim" attributeName="cy" from="65" to="15" dur="1s" repeatCount="indefinite" /></circle>
                        </g>
                        <g id="ppi-particle" transform="translate(450, 360)">
                            <circle r="10" class="ppi-inactive" id="ppi-node" />
                            <text x="15" y="5" class="label-text fill-purple-700" id="ppi-label">PPI</text>
                        </g>
                        <text id="ppi-caption" x="250" y="270" text-anchor="middle" class="label-text fill-gray-800">通常時：プロトンポンプから酸が放出されています</text>
                    </svg>
                </div>
                <div class="flex gap-4 justify-center">
                    <button onclick="startPPIAnimation()" class="px-8 py-3 bg-purple-600 text-white rounded-xl font-bold hover:bg-purple-700 transition shadow-lg">機序を再生</button>
                    <button onclick="resetCurrentPage()" class="px-6 py-3 bg-gray-200 rounded-xl font-bold hover:bg-gray-300">リセット</button>
                </div>
            </div>
        </div>

        <!-- H2 DETAIL PAGE -->
        <div id="h2-detail" class="page">
            <button onclick="showPage('gi-tract')" class="mb-4 text-indigo-600 hover:underline flex items-center">
                ← 消化器ページへ戻る
            </button>
            <div class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100">
                <h2 class="text-2xl font-bold mb-6 text-gray-800 flex items-center">
                    <span class="w-2 h-8 bg-red-500 rounded-full mr-3"></span>
                    H2ブロッカーの作用機序
                </h2>
                <!-- H2 SVG Animation Container -->
                <div class="relative w-full h-[350px] bg-white rounded-xl overflow-hidden border border-gray-200 mb-6">
                    <svg viewBox="0 0 500 400" id="h2-svg" class="w-full h-full">
                        <rect x="0" y="0" width="500" height="80" fill="#e0f2fe" />
                        <rect x="0" y="320" width="500" height="80" fill="#fee2e2" />
                        <line x1="0" y1="320" x2="500" y2="320" stroke="#fca5a5" stroke-width="2" class="blood-flow" />
                        <path d="M 40,80 L 460,80 L 460,320 L 40,320 Z" fill="#fffbeb" stroke="#fbbf24" stroke-width="4" />
                        <g id="h2-receptor">
                            <path d="M 210,320 L 210,290 Q 250,260 290,290 L 290,320" fill="#10b981" />
                        </g>
                        <rect x="220" y="70" width="60" height="15" rx="3" fill="#e11d48" />
                        <g id="h2-acid-flow">
                            <circle cx="250" cy="65" r="4" fill="#3b82f6"><animate attributeName="cy" from="65" to="15" dur="1s" repeatCount="indefinite" /></circle>
                        </g>
                        <g id="histamine-node" transform="translate(100, 360)"><circle r="8" class="histamine" /></g>
                        <g id="blocker-node" transform="translate(450, 360)" style="display:none;"><circle r="10" class="h2-blocker" /></g>
                        <text id="h2-caption" x="250" y="170" text-anchor="middle" class="label-text fill-gray-800">通常時：ヒスタミンが酸分泌を命令します</text>
                    </svg>
                </div>
                <div class="flex gap-4 justify-center">
                    <button onclick="startH2Animation()" class="px-8 py-3 bg-red-600 text-white rounded-xl font-bold hover:bg-red-700 transition shadow-lg">機序を再生</button>
                    <button onclick="resetCurrentPage()" class="px-6 py-3 bg-gray-200 rounded-xl font-bold hover:bg-gray-300">リセット</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ページ切り替えロジック
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function resetCurrentPage() {
            const activePage = document.querySelector('.page.active').id;
            showPage(activePage); 
            // 簡易的にDOMの状態を戻すには再描画が必要だが、ここではボタンによる再実行を可能にする。
            location.reload(); 
        }

        // --- アニメーション共通関数 ---
        function moveElement(el, from, to, duration) {
            return new Promise(resolve => {
                const start = performance.now();
                function animate(time) {
                    let progress = (time - start) / duration;
                    if (progress > 1) progress = 1;
                    const curX = from.x + (to.x - from.x) * progress;
                    const curY = from.y + (to.y - from.y) * progress;
                    el.setAttribute('transform', `translate(${curX}, ${curY})`);
                    if (progress < 1) requestAnimationFrame(animate); else resolve();
                }
                requestAnimationFrame(animate);
            });
        }
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // --- PPIアニメーション ---
        async function startPPIAnimation() {
            const ppi = document.getElementById('ppi-particle');
            const ppiBody = document.getElementById('ppi-node');
            const ppiLabel = document.getElementById('ppi-label');
            const caption = document.getElementById('ppi-caption');
            const acid = document.getElementById('ppi-acid-flow');
            
            caption.textContent = "1. 血液から壁細胞内へ取り込まれます";
            await moveElement(ppi, {x: 450, y: 360}, {x: 250, y: 200}, 2000);
            
            caption.textContent = "2. 酸性環境で活性型に変身！";
            await moveElement(ppi, {x: 250, y: 200}, {x: 250, y: 120}, 1000);
            ppiBody.setAttribute('class', 'ppi-active');
            ppiLabel.textContent = "活性型";
            await sleep(1000);

            caption.textContent = "3. ポンプに結合して完全にブロックします";
            await moveElement(ppi, {x: 250, y: 120}, {x: 250, y: 80}, 800);
            acid.style.display = 'none';
            caption.textContent = "完了：胃酸の分泌が止まりました";
        }

        // --- H2アニメーション ---
        async function startH2Animation() {
            const hist = document.getElementById('histamine-node');
            const blocker = document.getElementById('blocker-node');
            const caption = document.getElementById('h2-caption');
            const acid = document.getElementById('h2-acid-flow');

            caption.textContent = "1. ヒスタミンが受容体に結合します";
            await moveElement(hist, {x: 100, y: 360}, {x: 250, y: 310}, 1500);
            await sleep(800);

            blocker.style.display = "block";
            caption.textContent = "2. H2ブロッカーが登場";
            await moveElement(blocker, {x: 450, y: 360}, {x: 350, y: 360}, 1000);

            caption.textContent = "3. 受容体への結合を競合し、刺激を遮断！";
            moveElement(hist, {x: 250, y: 310}, {x: 150, y: 380}, 800);
            await moveElement(blocker, {x: 350, y: 360}, {x: 250, y: 310}, 800);
            
            acid.style.display = 'none';
            caption.textContent = "完了：酸分泌の命令が届かなくなりました";
        }
    </script>
</body>
</html>
