<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H2ブロッカーの作用機序</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes flow {
            from { stroke-dashoffset: 100; }
            to { stroke-dashoffset: 0; }
        }
        .blood-flow {
            stroke-dasharray: 10, 10;
            animation: flow 5s linear infinite;
        }
        
        #cell-body {
            fill: #fffbeb;
            stroke: #fbbf24;
            stroke-width: 4;
        }
        
        .histamine { fill: #ef4444; stroke: #991b1b; stroke-width: 1; } /* 赤：刺激 */
        .h2-blocker { fill: #3b82f6; stroke: #1e3a8a; stroke-width: 2; } /* 青：ブロック */
        
        .label-text { font-family: 'sans-serif'; font-weight: 800; font-size: 14px; }
        .area-label { font-size: 16px; letter-spacing: 0.1em; }
    </style>
</head>
<body class="bg-gray-50 p-4 flex flex-col items-center">

    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-2xl border border-gray-100">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 flex items-center">
            <span class="w-2 h-8 bg-red-500 rounded-full mr-3"></span>
            H2ブロッカーの作用機序
        </h2>
        
        <div class="relative w-full h-[400px] rounded-xl overflow-hidden border-2 border-gray-200 mb-6 bg-white">
            <svg viewBox="0 0 500 400" class="w-full h-full">
                <!-- 1. 管腔側（胃液）エリア -->
                <rect x="0" y="0" width="500" height="80" fill="#e0f2fe" />
                <text x="20" y="35" class="area-label label-text fill-blue-700">【 管腔側（胃の中） 】</text>

                <!-- 2. 血液側（血管）エリア -->
                <rect x="0" y="320" width="500" height="80" fill="#fee2e2" />
                <line x1="0" y1="320" x2="500" y2="320" stroke="#fca5a5" stroke-width="2" class="blood-flow" />
                <text x="20" y="355" class="area-label label-text fill-red-700">【 血液側（血管） 】</text>

                <!-- 3. 壁細胞本体 -->
                <path id="cell-body" d="M 40,80 L 460,80 L 460,320 L 40,320 Z" />
                <text x="210" y="200" class="area-label label-text fill-yellow-700" opacity="0.3">壁細胞</text>

                <!-- H2受容体（血液側に面している） -->
                <g id="receptor-group">
                    <path d="M 210,320 L 210,290 Q 250,260 290,290 L 290,320" fill="#10b981" />
                    <text x="205" y="260" class="label-text fill-green-700" style="font-size: 12px;">H2受容体</text>
                </g>

                <!-- プロトンポンプ（出口） -->
                <rect x="220" y="70" width="60" height="20" rx="3" fill="#e11d48" />
                <text x="285" y="75" class="label-text fill-red-600" style="font-size: 10px;">ポンプ</text>

                <!-- 胃酸放出（通常時） -->
                <g id="acid-flow">
                    <circle cx="250" cy="65" r="4" fill="#3b82f6">
                        <animate id="acid-anim" attributeName="cy" from="65" to="15" dur="1s" repeatCount="indefinite" />
                        <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" />
                    </circle>
                </g>

                <!-- ヒスタミン（刺激物質） -->
                <g id="histamine-particle" transform="translate(100, 360)">
                    <circle r="8" class="histamine" />
                    <text x="12" y="5" class="label-text fill-red-600" style="font-size: 10px;">ヒスタミン</text>
                </g>

                <!-- H2ブロッカー薬物 -->
                <g id="blocker-capsule" transform="translate(450, 360)" style="display:none;">
                    <circle r="10" class="h2-blocker" />
                    <text x="15" y="5" class="label-text fill-blue-700">H2ブロッカー</text>
                </g>
                
                <!-- ナレーション字幕 -->
                <rect x="40" y="140" width="420" height="45" rx="10" fill="white" fill-opacity="0.9" stroke="#e5e7eb" />
                <text id="caption" x="250" y="170" text-anchor="middle" class="label-text fill-gray-800">通常時：ヒスタミンが受容体に結合して「酸を出せ」と指令します</text>
            </svg>
        </div>

        <div class="flex gap-4 justify-center">
            <button onclick="location.reload()" class="px-6 py-3 bg-gray-200 text-gray-700 rounded-xl hover:bg-gray-300 transition font-bold">リセット</button>
            <button id="start-btn" onclick="startH2Animation()" class="px-8 py-3 bg-red-600 text-white rounded-xl hover:bg-red-700 shadow-lg shadow-red-200 transition font-bold text-lg">
                機序を再生する
            </button>
        </div>
        
        <div class="mt-8 p-4 bg-green-50 rounded-xl border border-green-100 text-sm">
            <p class="text-green-800 font-bold mb-2">💡 PPIとの違い</p>
            <ul class="list-disc ml-5 space-y-1 text-green-700">
                <li><strong>PPI</strong>：出口（ポンプ）を直接ロックする（最強の抑制力）。</li>
                <li><strong>H2ブロッカー</strong>：スイッチ（受容体）にフタをして指令を遮断する。</li>
                <li>受容体は他にもあるため、PPIに比べると抑制力はマイルドですが、即効性に優れる面もあります。</li>
            </ul>
        </div>
    </div>

    <script>
        const histamine = document.getElementById('histamine-particle');
        const blocker = document.getElementById('blocker-capsule');
        const caption = document.getElementById('caption');
        const acid = document.getElementById('acid-flow');
        const startBtn = document.getElementById('start-btn');

        async function startH2Animation() {
            startBtn.disabled = true;
            startBtn.classList.add('opacity-50');

            // 1. 通常時の刺激
            caption.textContent = "1. ヒスタミンが血液から流れてきて受容体に結合します";
            await moveElement(histamine, {x: 100, y: 360}, {x: 250, y: 310}, 1500);
            await sleep(1000);

            // 2. 薬の登場
            blocker.style.display = "block";
            caption.textContent = "2. そこへH2ブロッカーが登場します";
            await moveElement(blocker, {x: 450, y: 360}, {x: 350, y: 360}, 1000);
            
            // 3. 追い出し・ブロック
            caption.textContent = "3. ヒスタミンより先に受容体へ座り込み、刺激をブロック！";
            // ヒスタミンを弾き飛ばす
            moveElement(histamine, {x: 250, y: 310}, {x: 150, y: 380}, 800);
            await moveElement(blocker, {x: 350, y: 360}, {x: 250, y: 310}, 800);
            await sleep(500);

            // 4. 指令が届かないので酸が止まる
            caption.textContent = "4. 指令が届かなくなったので、ポンプからの酸分泌が減少します";
            acid.style.display = 'none';
            
            caption.innerHTML = "完了：H2受容体を遮断し、酸の分泌を抑えました";
        }

        function moveElement(el, from, to, duration) {
            return new Promise(resolve => {
                const start = performance.now();
                function animate(time) {
                    let progress = (time - start) / duration;
                    if (progress > 1) progress = 1;
                    const curX = from.x + (to.x - from.x) * progress;
                    const curY = from.y + (to.y - from.y) * progress;
                    el.setAttribute('transform', `translate(${curX}, ${curY})`);
                    if (progress < 1) requestAnimationFrame(animate);
                    else resolve();
                }
                requestAnimationFrame(animate);
            });
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    </script>
</body>
</html>
